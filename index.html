<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="IMP Tracker"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Camp Butmir — IMP Violation Tracker</title>
<style>
:root{--bg:#fff;--bg2:#f5f5f4;--bg3:#eeede9;--text:#1a1a19;--text2:#6b6b68;--text3:#999994;--border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.22);--radius:10px;--rsm:7px;--blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#0C447C;--green:#3B6D11;--green-bg:#EAF3DE;--green-text:#27500A;--red:#A32D2D;--red-bg:#FCEBEB;--red-text:#791F1F;--amber:#854F0B;--amber-bg:#FAEEDA;--amber-text:#633806;--gray-bg:#F1EFE8;--gray-text:#5F5E5A}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--text:#f0efe8;--text2:#a0a09a;--text3:#6b6b66;--border:rgba(255,255,255,.10);--border2:rgba(255,255,255,.18);--blue:#378ADD;--blue-bg:#042C53;--blue-text:#B5D4F4;--green:#639922;--green-bg:#173404;--green-text:#C0DD97;--red:#E24B4A;--red-bg:#501313;--red-text:#F7C1C1;--amber:#EF9F27;--amber-bg:#412402;--amber-text:#FAC775;--gray-bg:#2C2C2A;--gray-text:#B4B2A9}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg3);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--text)}
.app{max-width:480px;margin:0 auto;padding:12px 12px 90px;min-height:100vh}
.header{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.header-icon{width:38px;height:38px;background:var(--blue);border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header-icon svg{width:20px;height:20px;fill:white}
.header h1{font-size:14px;font-weight:600;color:var(--text)}
.header p{font-size:11px;color:var(--text2);margin-top:1px}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:0.5px solid var(--border);display:flex;z-index:100;max-width:480px;margin:0 auto}
.nav-item{flex:1;padding:8px 4px 6px;text-align:center;cursor:pointer;border:none;background:none;color:var(--text2);font-family:inherit}
.nav-item svg{width:20px;height:20px;display:block;margin:0 auto 2px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-item span{font-size:10px;display:block}
.nav-item.active{color:var(--blue)}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.sec{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.field{margin-bottom:12px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:0.5px solid var(--border2);border-radius:var(--rsm);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;outline:none;appearance:none;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue)}
.field textarea{resize:vertical;min-height:68px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:11px;border:0.5px solid var(--border2);border-radius:var(--rsm);background:var(--bg);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.btn:active{opacity:.7}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-red{background:var(--red);color:#fff;border-color:var(--red)}
.btn-sm{width:auto;padding:5px 10px;font-size:12px}
.btn-row{display:flex;gap:8px}
.btn-row .btn{margin:0}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-right:3px;margin-bottom:3px}
.b-red{background:var(--red-bg);color:var(--red-text)}
.b-amber{background:var(--amber-bg);color:var(--amber-text)}
.b-blue{background:var(--blue-bg);color:var(--blue-text)}
.b-green{background:var(--green-bg);color:var(--green-text)}
.b-gray{background:var(--gray-bg);color:var(--gray-text)}
.s-susp{background:var(--red-bg);border:0.5px solid var(--red);border-radius:var(--rsm);padding:7px 11px;font-size:12px;color:var(--red-text);font-weight:600;margin-top:7px}
.s-ok{background:var(--green-bg);border:0.5px solid var(--green);border-radius:var(--rsm);padding:7px 11px;font-size:12px;color:var(--green-text);font-weight:600;margin-top:7px}
.s-warn{background:var(--amber-bg);border:0.5px solid var(--amber);border-radius:var(--rsm);padding:7px 11px;font-size:12px;color:var(--amber-text);font-weight:600;margin-top:7px}
.hint{font-size:13px;color:var(--text2);line-height:1.6}
.ac-wrap{position:relative}
.ac-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--bg);border:0.5px solid var(--blue);border-radius:var(--rsm);z-index:50;box-shadow:0 4px 16px rgba(0,0,0,.12);max-height:180px;overflow-y:auto;margin-top:2px}
.ac-item{padding:10px 12px;cursor:pointer;border-bottom:0.5px solid var(--border);font-size:13px;color:var(--text)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item:active{background:var(--blue-bg)}
.ac-name{font-weight:600}
.ac-sub{font-size:11px;color:var(--text2);margin-top:1px}
.person-banner{border-radius:var(--rsm);padding:10px 12px;margin-bottom:12px;font-size:13px;line-height:1.6}
.person-banner.warn{background:var(--amber-bg);border:0.5px solid var(--amber);color:var(--amber-text)}
.person-banner.danger{background:var(--red-bg);border:0.5px solid var(--red);color:var(--red-text)}
.person-banner.info{background:var(--blue-bg);border:0.5px solid var(--blue);color:var(--blue-text)}
.pb-title{font-weight:600;margin-bottom:3px}
.empty{text-align:center;padding:32px;color:var(--text3);font-size:13px}
/* Dashboard */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.dash-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center;cursor:pointer}
.dash-card:active{opacity:.7}
.dash-num{font-size:28px;font-weight:600;color:var(--text);line-height:1}
.dash-lbl{font-size:11px;color:var(--text2);margin-top:4px}
.dash-num.red{color:var(--red)}
.dash-num.amber{color:var(--amber)}
.dash-num.blue{color:var(--blue)}
.recent-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border)}
.recent-item:last-child{border-bottom:none}
.ri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ri-dot.red{background:var(--red)}
.ri-dot.green{background:var(--green)}
.ri-dot.amber{background:var(--amber)}
.ri-name{font-size:13px;font-weight:500;color:var(--text);flex:1;min-width:0}
.ri-sub{font-size:11px;color:var(--text3);white-space:nowrap}
.warn-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.warn-item:last-child{border-bottom:none}
.warn-pts{font-size:20px;font-weight:600;color:var(--amber);width:32px;text-align:center;flex-shrink:0}
.warn-name{font-size:13px;font-weight:500;color:var(--text);flex:1}
.warn-sub{font-size:11px;color:var(--text3)}
/* Records page */
.toolbar{display:flex;gap:6px;margin-bottom:10px;align-items:center}
.search-wrap{position:relative;flex:1}
.search-bar{width:100%;padding:9px 11px 9px 34px;border:0.5px solid var(--border2);border-radius:var(--rsm);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;outline:none}
.search-bar:focus{border-color:var(--blue)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;width:15px;height:15px}
.view-btns{display:flex;gap:4px}
.vbtn{padding:8px 9px;border:0.5px solid var(--border2);border-radius:var(--rsm);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center}
.vbtn svg{width:16px;height:16px;stroke:var(--text2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.vbtn.active{background:var(--blue-bg);border-color:var(--blue)}
.vbtn.active svg{stroke:var(--blue)}
.filter-row{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.fchip{padding:5px 11px;border:0.5px solid var(--border2);border-radius:20px;background:var(--bg);font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit;transition:background .15s,color .15s,border-color .15s}
.fchip:hover,.fchip:active{background:var(--bg2);color:var(--text);border-color:var(--border2)}
.fchip.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}
.fchip.active:hover,.fchip.active:active{background:#1254a0;color:#fff;border-color:#1254a0}
.sort-sel{padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--rsm);background:var(--bg);color:var(--text);font-size:12px;font-family:inherit;outline:none;appearance:none;-webkit-appearance:none;cursor:pointer}
/* List view */
.lv-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:6px;cursor:pointer}
.lv-item:active{opacity:.8}
.lv-status{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lv-status.susp{background:var(--red)}
.lv-status.ok{background:var(--green)}
.lv-status.warn{background:var(--amber)}
.lv-main{flex:1;min-width:0}
.lv-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lv-vtype{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lv-right{text-align:right;flex-shrink:0}
.lv-date{font-size:11px;color:var(--text3)}
.lv-pts{font-size:11px;font-weight:600;color:var(--amber-text);background:var(--amber-bg);padding:2px 6px;border-radius:10px;margin-top:3px;display:inline-block}
/* Expanded detail */
.detail-panel{background:var(--bg2);border-radius:var(--rsm);padding:12px;margin-top:4px;margin-bottom:4px}
/* Person view */
.pv-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.pv-header{padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:12px}
.pv-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.pv-avatar.susp{background:var(--red-bg);color:var(--red-text)}
.pv-avatar.warn{background:var(--amber-bg);color:var(--amber-text)}
.pv-avatar.ok{background:var(--blue-bg);color:var(--blue-text)}
.pv-info{flex:1;min-width:0}
.pv-name{font-size:14px;font-weight:600;color:var(--text)}
.pv-sub{font-size:11px;color:var(--text2);margin-top:1px}
.pv-pts{font-size:22px;font-weight:700;text-align:right;line-height:1}
.pv-ptslbl{font-size:10px;color:var(--text3);text-align:right}
.pv-records{border-top:0.5px solid var(--border);padding:0 14px}
/* Action steps */
.action-box{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rsm);padding:10px 12px;margin-top:8px;font-size:12px;line-height:1.8}
.action-box p.lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:5px}
/* QR */
.qr-outer{text-align:center;padding:14px 0}
.qr-outer canvas,.qr-outer img{border-radius:var(--rsm);border:4px solid white;box-shadow:0 0 0 1px var(--border);display:inline-block}
.qr-info{font-size:12px;color:var(--text2);margin-top:8px;line-height:1.6}
.scan-area{border:2px dashed var(--border2);border-radius:var(--radius);padding:18px;text-align:center;margin:10px 0}
.scan-area p{font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.5}
#scan-video{width:100%;border-radius:var(--rsm);max-height:240px;object-fit:cover;display:block}
.import-success{background:var(--green-bg);border:0.5px solid var(--green);border-radius:var(--rsm);padding:12px;margin-top:8px}
.import-already{background:var(--amber-bg);border:0.5px solid var(--amber);border-radius:var(--rsm);padding:10px 12px;margin-top:8px;font-size:13px;color:var(--amber-text)}
.rec-select{width:100%;border:0.5px solid var(--border2);border-radius:var(--rsm);background:var(--bg);color:var(--text);font-size:13px;padding:8px;font-family:inherit}
</style>
</head>

<script>
const NATO_RANKS=[
  {g:'OR — Other Ranks',ranks:['OR-1 (Private)','OR-2 (Private 2nd Class)','OR-3 (Lance Corporal)','OR-4 (Corporal)','OR-5 (Sergeant)','OR-6 (Staff Sergeant)','OR-7 (Sergeant First Class)','OR-8 (Master Sergeant)','OR-9 (Sergeant Major)']},
  {g:'OF — Officers',ranks:['OF-1 (Second Lieutenant)','OF-2 (First Lieutenant)','OF-3 (Captain)','OF-4 (Major)','OF-5 (Lieutenant Colonel)','OF-6 (Colonel)','OF-7 (Brigadier General)','OF-8 (Major General)','OF-9 (Lieutenant General)','OF-10 (General)']},
  {g:'Civilian',ranks:['CIV (Civilian)']}
];
const VIOLATIONS={
  'Speeding 5-10 km/h over limit':{pts:1,cat:'driving',notify:['SNR/Branch Chief (2nd violation+)']},
  'Speeding 11-20 km/h over limit':{pts:2,cat:'driving',suspDays:14,notify:['SNR/Branch Chief','HQ CAMP CMDT','FPM']},
  'Speeding 21+ km/h over limit':{pts:3,cat:'driving',suspDays:14,notify:['SNR/Branch Chief','HQ CAMP CMDT','FPM']},
  'Parking in front of Bldg 200 / circle':{pts:3,cat:'driving',notify:['SNR/Branch Chief','HQ CAMP CMDT','FPM']},
  'Parking violation':{pts:0,cat:'driving',notify:['SNR/Branch Chief (3rd violation+)']},
  'Smoking in NATO/EUFOR vehicle':{pts:2,cat:'driving',notify:['SNR/Branch Chief (2nd violation+)','FPM']},
  'Failure to fasten seatbelt':{pts:2,cat:'driving',notify:['SNR/Branch Chief (2nd violation+)']},
  'Using cellphone during driving':{pts:2,cat:'driving',notify:['SNR/Branch Chief (2nd violation+)','FPM']},
  'Operating vehicle under alcohol/drugs':{pts:0,cat:'driving',suspend:true,suspEOT:true,notify:['SNR/Branch Chief','FPM','HQ CAMP CMDT']},
  'Causing damage to EUFOR/NATO vehicle':{pts:0,cat:'driving',suspend:true,suspEOT:true,notify:['SNR/Branch Chief','FPM','HQ CAMP CMDT']},
  'Failure to report to IMP':{pts:0,cat:'conduct',notify:['SNR/Branch Chief','FPM']},
  'Uncooperative behaviour to IMP':{pts:0,cat:'conduct',notify:['SNR/Branch Chief','FPM']},
  'Dress prescription violation':{pts:0,cat:'conduct',notify:['SNR/Branch Chief (2nd violation+)','FPM']},
  'Alcohol prescription violation':{pts:0,cat:'conduct',notify:['SNR/Branch Chief','HQ CAMP CMDT','FPM']},
  'Weapon carry prescription violation':{pts:0,cat:'conduct',notify:['SNR/Branch Chief','FPM']},
  'Pedestrian violation':{pts:0,cat:'conduct',notify:['SNR/Branch Chief (3rd violation+)']},
  'Bicycle/scooter violation':{pts:0,cat:'conduct',notify:['SNR/Branch Chief (3rd violation+)']},
  'Quiet hours violation':{pts:0,cat:'conduct',notify:['SNR/Branch Chief (2nd violation+)','FPM']},
  'Not carrying ID card (visible place)':{pts:0,cat:'conduct',notify:['SNR/Branch Chief (3rd violation+)','FPM']},
  'Not carrying ID card in Camp Butmir':{pts:0,cat:'conduct',notify:['SNR/Branch Chief (2nd violation+)','FPM']}
};

let records=[];
let scanStream=null,scanInterval=null,currentPage='dash';
let _searchFilter='',_sortMode='newest',_filterMode='all',_viewMode='list',_expandedId=null,_expandedPerson=null;

function loadData(){try{const d=localStorage.getItem('cbvt_v3');if(d)records=JSON.parse(d);}catch(e){}}
function saveData(){try{localStorage.setItem('cbvt_v3',JSON.stringify(records));}catch(e){}}
function totalPtsForPerson(oid){return records.filter(r=>r.oid===oid).reduce((s,r)=>s+(r.pts||0),0);}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function setPage(p){
  currentPage=p;stopScan();
  ['dash','new','records','qr','data'].forEach(n=>{
    document.getElementById('page-'+n).style.display=n===p?'block':'none';
    const nav=document.getElementById('nav-'+n);if(nav)nav.classList.toggle('active',n===p);
  });
  if(p==='dash')renderDash();
  if(p==='new')renderNew();
  if(p==='records')renderRecords();
  if(p==='qr')renderQR();
  if(p==='data')renderData();
  window.scrollTo(0,0);
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDash(){
  const suspCount=records.filter(r=>r.susp).length;
  // People approaching 5pts (4pts, not yet suspended)
  const people={};
  records.forEach(r=>{if(!people[r.oid])people[r.oid]={first:r.first,last:r.last,rank:r.rank,oid:r.oid};});
  const nearLimit=Object.values(people).filter(p=>{const t=totalPtsForPerson(p.oid);return t>=4&&!records.find(r=>r.oid===p.oid&&r.susp);});
  const recent=records.slice(0,3);
  const total=records.length;

  let html=`
<div class="dash-grid">
  <div class="dash-card" onclick="setPage('records');_filterMode='all'">
    <div class="dash-num blue">${total}</div><div class="dash-lbl">Total records</div>
  </div>
  <div class="dash-card" onclick="setPage('records');_filterMode='suspended'">
    <div class="dash-num red">${suspCount}</div><div class="dash-lbl">Licenses suspended</div>
  </div>
</div>`;

  if(nearLimit.length>0){
    html+=`<div class="card"><p class="sec">Approaching suspension (4+ pts)</p>`;
    nearLimit.forEach(p=>{
      const t=totalPtsForPerson(p.oid);
      html+=`<div class="warn-item">
        <div class="warn-pts">${t}</div>
        <div><div class="warn-name">${p.rank} ${p.first} ${p.last}</div>
        <div class="warn-sub">${5-t} point(s) until suspension</div></div>
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="card"><p class="sec">Recent records</p>`;
  if(recent.length===0){
    html+=`<div class="empty" style="padding:16px">No records yet.</div>`;
  } else {
    recent.forEach(r=>{
      const dot=r.susp?'red':totalPtsForPerson(r.oid)>=4?'amber':'green';
      const d=new Date(r.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
      html+=`<div class="recent-item">
        <div class="ri-dot ${dot}"></div>
        <div class="ri-name">${r.rank} ${r.first} ${r.last}<br><span style="font-size:11px;color:var(--text2)">${r.vtype.slice(0,36)}</span></div>
        <div class="ri-sub">${d}</div>
      </div>`;
    });
  }
  html+=`</div>`;

  if(records.length>0){
    html+=`<button class="btn" onclick="setPage('records')" style="margin-top:2px">View all records →</button>`;
  }

  document.getElementById('page-dash').innerHTML=html;
}

// ─── NEW RECORD ───────────────────────────────────────────────────────────────
function renderNew(){
  let rankOpts='<option value="">Select rank...</option>';
  NATO_RANKS.forEach(g=>{rankOpts+=`<optgroup label="${g.g}">`;g.ranks.forEach(r=>{rankOpts+=`<option>${r}</option>`;});rankOpts+='</optgroup>';});
  let vD='<optgroup label="Driving violations">',vC='<optgroup label="Conduct violations">';
  Object.entries(VIOLATIONS).forEach(([name,v])=>{
    const lbl=v.suspend?' [LICENSE SUSPENDED]':v.pts>0?` [${v.pts} pt${v.pts>1?'s':''}]`:'';
    const opt=`<option value="${name}">${name}${lbl}</option>`;
    if(v.cat==='driving')vD+=opt;else vC+=opt;
  });
  vD+='</optgroup>';vC+='</optgroup>';
  const now=new Date(),pad=n=>String(n).padStart(2,'0');
  const dt=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
  document.getElementById('page-new').innerHTML=`
<div class="card"><p class="sec">Violator details</p>
  <div class="field"><label>NATO Rank</label><select id="f-rank">${rankOpts}</select></div>
  <div class="row2">
    <div class="field"><label>First name</label><input id="f-first" placeholder="John" autocomplete="off" oninput="onNameInput()"/></div>
    <div class="field ac-wrap"><label>Last name</label><input id="f-last" placeholder="Smith" autocomplete="off" oninput="onNameInput()" onfocus="onNameInput()"/>

  </div>

</div>
<div class="card"><p class="sec">Violation details</p>

}

function onViolChange(){
  const v=document.getElementById('f-vtype').value;
  const hint=document.getElementById('v-hint');
  document.getElementById('spd-wrap').style.display=v.toLowerCase().includes('speeding')?'block':'none';
  if(!v){hint.innerHTML='';return;}
  const vd=VIOLATIONS[v],ns=(vd.notify&&vd.notify.length)?vd.notify.join(', '):'';
  if(vd.suspend){
    const dur=vd.suspEOT?'until EOT':vd.suspDays?`for ${vd.suspDays} days`:'';
    hint.innerHTML=`<div class="s-susp">LICENSE SUSPENDED ${dur}</div>`+(ns?`<div class="s-warn" style="margin-top:4px;font-size:12px">Notify immediately: ${ns}</div>`:'');
  } else if(vd.pts>0){
    hint.innerHTML=`<span class="badge b-amber">${vd.pts} penalty point(s)</span>`+(ns?`<div class="s-warn" style="margin-top:6px;font-size:12px">Notify: ${ns}</div>`:'');
  } else {
    hint.innerHTML=`<span class="badge b-gray">Warning / disciplinary only</span>`+(ns?`<div style="font-size:12px;color:var(--text2);margin-top:5px">Notify: ${ns}</div>`:'');
  }
}

function onNameInput(){
  const first=document.getElementById('f-first').value.trim().toLowerCase();
  const last=document.getElementById('f-last').value.trim().toLowerCase();
  const dropdown=document.getElementById('ac-dropdown');
  const banner=document.getElementById('person-banner');
  if(!dropdown||!banner)return;

  // Build unique people list from records
  const people={};
  records.forEach(r=>{
    if(!people[r.oid])people[r.oid]={first:r.first,last:r.last,rank:r.rank,unit:r.unit,oid:r.oid};
  });

  // Match by first or last name
  const query=(first+' '+last).trim();
  if(query.length<2){dropdown.style.display='none';banner.innerHTML='';return;}

  const matches=Object.values(people).filter(p=>{
    const full=(p.first+' '+p.last).toLowerCase();
    const fl=p.first.toLowerCase(),ll=p.last.toLowerCase();
    return fl.includes(first)||ll.includes(last)||(last.length>=2&&ll.startsWith(last))||(first.length>=2&&fl.startsWith(first));
  }).slice(0,6);

  // Show dropdown
  if(matches.length>0){
    dropdown.style.display='block';
    dropdown.innerHTML=matches.map(p=>{
      const tp=totalPtsForPerson(p.oid);
      const rcount=records.filter(r=>r.oid===p.oid).length;
      const susp=records.some(r=>r.oid===p.oid&&r.susp);
      const statusIcon=susp?'🔴':tp>=4?'🟡':'🟢';
      return `<div class="ac-item" onclick="selectPerson('${p.oid}')">
        <div class="ac-name">${statusIcon} ${p.rank} ${p.first} ${p.last}</div>
        <div class="ac-sub">${p.unit||'—'} · ${rcount} violation${rcount>1?'s':''} · ${tp} pts${susp?' · SUSPENDED':''}</div>
      </div>`;
    }).join('');
  } else {
    dropdown.style.display='none';
  }

  // Show person banner if exact match found
  const exactOid=(document.getElementById('f-first').value.trim()+'_'+document.getElementById('f-last').value.trim()).toLowerCase().replace(/\s+/g,'_');
  const exactMatch=Object.values(people).find(p=>p.oid===exactOid);
  if(exactMatch){
    showPersonBanner(exactMatch);
  } else {
    banner.innerHTML='';
  }
}

function selectPerson(oid){
  const people={};
  records.forEach(r=>{if(!people[r.oid])people[r.oid]={first:r.first,last:r.last,rank:r.rank,unit:r.unit,oid:r.oid};});
  const p=people[oid];
  if(!p)return;
  document.getElementById('f-first').value=p.first;
  document.getElementById('f-last').value=p.last;
  document.getElementById('f-rank').value=p.rank;
  document.getElementById('f-unit').value=p.unit||'';
  document.getElementById('ac-dropdown').style.display='none';
  showPersonBanner(p);
}

function showPersonBanner(p){
  const banner=document.getElementById('person-banner');
  if(!banner)return;
  const tp=totalPtsForPerson(p.oid);
  const recs=records.filter(r=>r.oid===p.oid);
  const susp=recs.some(r=>r.susp);
  const lastRec=recs[0];
  const lastDate=lastRec?new Date(lastRec.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—';

  let cls='info',icon='ℹ';
  if(susp){cls='danger';icon='🚫';}
  else if(tp>=4){cls='warn';icon='⚠';}
  else if(recs.length>0){cls='warn';icon='⚠';}

  banner.innerHTML=`<div class="person-banner ${cls}">
    <div class="pb-title">${icon} ${p.rank} ${p.first} ${p.last} — already in database</div>
    <div>${recs.length} violation${recs.length>1?'s':''} on record · ${tp} penalty point${tp!==1?'s':''} · Last: ${lastDate}</div>
    ${susp?'<div style="font-weight:600;margin-top:3px">LICENSE CURRENTLY SUSPENDED</div>':''}
    ${tp>=4&&!susp?'<div style="font-weight:600;margin-top:3px">Warning: '+tp+'/5 points — approaching suspension</div>':''}
    <div style="margin-top:6px"><button class="btn btn-sm" style="font-size:11px;padding:4px 10px" onclick="setPage('records');_searchFilter='${p.first} ${p.last}';renderRecords();setTimeout(()=>{const si=document.getElementById('search-input');if(si){si.value='${p.first} ${p.last}';}},100)">View all records for this person →</button></div>
  </div>`;
}

// Close dropdown when clicking outside
document.addEventListener('click',function(e){
  const dd=document.getElementById('ac-dropdown');
  if(dd&&!dd.contains(e.target)&&e.target.id!=='f-last'&&e.target.id!=='f-first'){dd.style.display='none';}
});

function submitRecord(){
  const rank=document.getElementById('f-rank').value;
  const first=document.getElementById('f-first').value.trim();
  const last=document.getElementById('f-last').value.trim();
  const unit=document.getElementById('f-unit').value.trim();
  const vtype=document.getElementById('f-vtype').value;
  const occur=parseInt(document.getElementById('f-occur').value);
  const notes=document.getElementById('f-notes').value.trim();
  const officer=document.getElementById('f-officer').value.trim();
  const date=document.getElementById('f-date').value;
  const speedEl=document.getElementById('f-speed');
  const speed=speedEl?speedEl.value:'';
  if(!rank||!first||!last||!vtype){alert('Please fill in rank, name, and violation type.');return;}
  const vd=VIOLATIONS[vtype],pts=vd?vd.pts:0;
  const oid=(first+'_'+last).toLowerCase().replace(/\s+/g,'_');
  const newTotal=totalPtsForPerson(oid)+pts;
  const susp=(vd&&vd.suspend)||newTotal>=5;
  let suspDuration='',suspUntil='';
  if(susp){
    if(vd&&vd.suspEOT){suspDuration='Until EOT (End of Tour)';}
    else if(newTotal>=5){suspDuration='1 month (5 penalty points)';const u=new Date();u.setMonth(u.getMonth()+1);suspUntil=u.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
    else if(vd&&vd.suspDays){suspDuration=`${vd.suspDays} days`;const u=new Date();u.setDate(u.getDate()+vd.suspDays);suspUntil=u.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
  }
  const notify=(vd&&vd.notify)?vd.notify:[];
  const rec={id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),rank,first,last,unit,vtype,occur,notes,officer,date:date||new Date().toISOString(),speed:speed||'',pts,susp,suspDuration,suspUntil,notify,oid,ts:Date.now()};
  records.unshift(rec);saveData();
  let msg='';
  if(susp){msg=`Record saved.\n\nLICENSE SUSPENDED\nDuration: ${suspDuration}${suspUntil?'\nUntil: '+suspUntil:''}\n\nNotify immediately:\n${notify.map(n=>'• '+n).join('\n')}`;}
  else if(pts>0){msg=`Record saved.\nPoints added: ${pts}\nTotal for ${first} ${last}: ${newTotal}/5`;if(notify.length)msg+=`\n\nNotify: ${notify.join(', ')}`;}
  else{msg='Record saved.';if(notify.length)msg+=`\n\nNotify: ${notify.join(', ')}`;}
  alert(msg);renderNew();
}

function onSearch(v){_searchFilter=v;refreshList();}
function setView(v){_viewMode=v;renderRecords();}
function setFilter(f){_filterMode=f;refreshList();}
function setSort(s){_sortMode=s;refreshList();}

function getFilteredSorted(){
  let res=[...records];
  // search
  const s=_searchFilter.toLowerCase();
  if(s)res=res.filter(r=>(r.first+' '+r.last+' '+r.rank+' '+r.unit+' '+r.vtype).toLowerCase().includes(s));
  // filter
  if(_filterMode==='suspended')res=res.filter(r=>r.susp);
  else if(_filterMode==='speeding')res=res.filter(r=>r.vtype.toLowerCase().includes('speeding'));
  else if(_filterMode==='driving')res=res.filter(r=>(VIOLATIONS[r.vtype]||{}).cat==='driving');
  else if(_filterMode==='conduct')res=res.filter(r=>(VIOLATIONS[r.vtype]||{}).cat==='conduct');
  // sort
  if(_sortMode==='newest')res.sort((a,b)=>b.ts-a.ts);
  else if(_sortMode==='oldest')res.sort((a,b)=>a.ts-b.ts);
  else if(_sortMode==='name')res.sort((a,b)=>a.last.localeCompare(b.last));
  else if(_sortMode==='pts')res.sort((a,b)=>totalPtsForPerson(b.oid)-totalPtsForPerson(a.oid));
  return res;
}

function refreshList(){
  const list=document.getElementById('records-list');
  if(!list)return;
  const filtered=getFilteredSorted();
  if(filtered.length===0){list.innerHTML=`<div class="empty">${records.length===0?'No records yet.':'No records match your filters.'}</div>`;return;}
  if(_viewMode==='list')list.innerHTML=filtered.map(r=>buildListItem(r)).join('');
  else list.innerHTML=buildPersonView(filtered);
}

function buildListItem(r){
  const dot=r.susp?'susp':totalPtsForPerson(r.oid)>=4?'warn':'ok';

      <div class="lv-date">${d}</div>
      ${r.pts>0?`<div class="lv-pts">${r.pts} pts</div>`:''}
    </div>

    html+=`<div class="detail-panel">

      <p style="font-size:11px;color:var(--text3);margin-bottom:8px">Reported by: ${r.officer||'—'} · Occurrence #${r.occur} · ${new Date(r.date).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</p>
      <div class="action-box"><p class="lbl">IMP Action Required</p>${buildActionSteps(r)}</div>
      <div style="margin-top:10px;display:flex;justify-content:space-between">

function toggleExpand(id){
  _expandedId=(_expandedId===id)?null:id;

}

function buildPersonView(filtered){
  // group by oid
  const groups={};
  filtered.forEach(r=>{
    if(!groups[r.oid])groups[r.oid]={first:r.first,last:r.last,rank:r.rank,unit:r.unit,oid:r.oid,recs:[]};
    groups[r.oid].recs.push(r);
  });
  // sort groups
  let gList=Object.values(groups);
  if(_sortMode==='name')gList.sort((a,b)=>a.last.localeCompare(b.last));
  else if(_sortMode==='pts')gList.sort((a,b)=>totalPtsForPerson(b.oid)-totalPtsForPerson(a.oid));
  else gList.sort((a,b)=>(b.recs[0].ts||0)-(a.recs[0].ts||0));

  return gList.map(g=>{
    const tp=totalPtsForPerson(g.oid);
    const hasSusp=g.recs.some(r=>r.susp);
    const cls=hasSusp?'susp':tp>=4?'warn':'ok';
    const initials=(g.first[0]||'')+(g.last[0]||'');
    const expanded=_expandedPerson===g.oid;
    let html=`<div class="pv-card">
      <div class="pv-header" onclick="togglePerson('${g.oid}')">
        <div class="pv-avatar ${cls}">${initials}</div>
        <div class="pv-info">
          <div class="pv-name">${g.rank} ${g.first} ${g.last}</div>
          <div class="pv-sub">${g.unit||'—'} · ${g.recs.length} violation${g.recs.length>1?'s':''}</div>
          ${hasSusp?'<span class="badge b-red" style="margin-top:3px">Suspended</span>':tp>=4?'<span class="badge b-amber" style="margin-top:3px">'+tp+'/5 pts</span>':''}
        </div>
        <div>
          <div class="pv-pts" style="color:${hasSusp?'var(--red)':tp>=4?'var(--amber)':'var(--text)'}">${tp}</div>
          <div class="pv-ptslbl">pts total</div>
        </div>
      </div>`;
    if(expanded){
      html+=`<div class="pv-records">`;
      g.recs.forEach(r=>{
        const d=new Date(r.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
        html+=`<div style="padding:10px 0;border-bottom:0.5px solid var(--border)">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
            <span class="badge b-blue" style="font-size:11px">${r.vtype.slice(0,40)}</span>
            <button class="btn btn-sm" style="color:var(--red);border-color:var(--red);flex-shrink:0;margin-left:6px" onclick="deleteRecord('${r.id}')">Del</button>
          </div>
          ${r.pts>0?`<span class="badge b-amber">${r.pts} pts</span>`:''}
          ${r.susp?`<div class="s-susp" style="margin-top:5px">SUSPENDED — ${r.suspDuration}${r.suspUntil?' until '+r.suspUntil:''}</div>`:''}
          ${r.speed?`<p style="font-size:12px;color:var(--text2);margin-top:4px">Speed over: ${r.speed} km/h</p>`:''}
          ${r.notes?`<p style="font-size:12px;color:var(--text2);font-style:italic;margin-top:3px">${r.notes}</p>`:''}
          <p style="font-size:11px;color:var(--text3);margin-top:4px">${r.officer||'—'} · Occ. #${r.occur} · ${d}</p>
          <div class="action-box" style="margin-top:6px"><p class="lbl">IMP Action</p>${buildActionSteps(r)}</div>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
    return html;
  }).join('');
}

function confirmPIN(id){
  const input=document.getElementById('pin-input');
  const err=document.getElementById('pin-err');
  if(input.value==='2685'){

    err.textContent='Incorrect PIN.';

  }
}

// ─── ACTION STEPS ─────────────────────────────────────────────────────────────
function buildActionSteps(r){
  const vd=VIOLATIONS[r.vtype]||{};
  const steps=[];let n=1;
  steps.push(`<b>${n++}.</b> File <b>IMP Occurrence Report</b> — record in IMP daily occurrence book.`);
  if(r.susp){
    steps.push(`<b>${n++}.</b> <b>Confiscate driving permit</b> immediately. Hand to IMP Station Commander.`);
    if(vd.suspEOT)steps.push(`<b>${n++}.</b> Suspension: <b>until EOT</b> — no EUFOR/NATO vehicle operation.`);
    else if(r.suspUntil)steps.push(`<b>${n++}.</b> Suspension: <b>${r.suspDuration}</b> (until ${r.suspUntil}).`);
  }
  if(r.notify&&r.notify.length)steps.push(`<b>${n++}.</b> Notify via IMP Report: <b>${r.notify.join(', ')}</b>.`);
  if(vd.notify&&vd.notify.some(x=>x.includes('FPM')))steps.push(`<b>${n++}.</b> Submit copy to <b>FPM (Force Protection Manager)</b>.`);
  if(vd.notify&&vd.notify.some(x=>x.includes('HQ CAMP CMDT')))steps.push(`<b>${n++}.</b> Forward to <b>HQ CAMP CMDT Operations Section</b>.`);
  if(r.vtype.includes('alcohol')||r.vtype.includes('drugs'))steps.push(`<b>${n++}.</b> Escort to <b>IMP Station</b>. Decide if <b>Medical Cell</b> referral needed.`);
  if(r.susp&&!vd.suspend)steps.push(`<b>${n++}.</b> 5-point threshold reached. Notify SNR, forward to HQ CAMP CMDT.`);
  return steps.map(s=>`<div style="margin-bottom:2px">${s}</div>`).join('');
}

// ─── QR SYNC ──────────────────────────────────────────────────────────────────
function renderQR(){
  const selOpts=records.length===0?'<option value="">No records available</option>':records.map((r,i)=>{const d=new Date(r.date).toLocaleDateString('en-GB');return `<option value="${i}">${r.rank} ${r.first} ${r.last} — ${r.vtype.slice(0,30)} (${d})</option>`;}).join('');
  document.getElementById('page-qr').innerHTML=`
<div class="card"><p class="sec">Generate QR — send a record</p>
  <p class="hint" style="margin-bottom:10px">Select a record, generate QR, show it to another officer to scan.</p>
  <div class="field"><label>Select record</label><select class="rec-select" id="qr-select" size="5">${selOpts}</select></div>
  <button class="btn btn-primary" onclick="genQR()" ${records.length===0?'disabled':''}>Generate QR code</button>
  <div id="qr-output" style="margin-top:12px"></div>
</div>
<div class="card" style="margin-top:10px"><p class="sec">Scan QR — receive a record</p>
  <p class="hint" style="margin-bottom:10px">Scan a QR code from another officer's screen.</p>
  <div class="scan-area" id="scan-area">
    <p>Camera will open here.</p>
    <button class="btn btn-green" onclick="startScan()">Start camera scan</button>
  </div>
  <div id="scan-result"></div>
</div>
<div class="card" style="margin-top:10px"><p class="sec">Manual paste (fallback)</p>
  <p class="hint" style="margin-bottom:10px">Paste JSON text received from another officer.</p>
  <div class="field"><textarea id="manual-paste" placeholder="Paste record JSON here..."></textarea></div>
  <button class="btn" onclick="manualImport()">Import pasted data</button>
  <div id="manual-result" style="margin-top:8px"></div>
</div>`;
}

function genQR(){
  const sel=document.getElementById('qr-select');
  if(!sel||sel.selectedIndex<0||sel.value===''){alert('Please select a record first.');return;}
  const rec=records[parseInt(sel.value)];if(!rec)return;
  const payload=JSON.stringify({cbvt:1,r:rec});
  const output=document.getElementById('qr-output');
  if(payload.length>2953){output.innerHTML=`<div class="s-susp">Record too large for QR. Shorten the notes, or use JSON export.</div>`;return;}
  window._lastQRPayload=payload;
  output.innerHTML='<div class="qr-outer"><div id="qr-canvas"></div><p class="qr-info">Show this QR to another officer.<br><b>'+rec.rank+' '+rec.first+' '+rec.last+'</b><br>'+rec.vtype+'</p></div>'
    +'<div style="margin-top:10px"><p style="font-size:12px;color:var(--text2);margin-bottom:6px">Camera not working? Share as text:</p>'
    +'<button class="btn" id="copy-btn" onclick="copyJSON()">Copy record as text</button><div id="copy-result"></div></div>';
  try{new QRCode(document.getElementById('qr-canvas'),{text:payload,width:240,height:240,correctLevel:QRCode.CorrectLevel.M});}
  catch(e){output.innerHTML=`<div class="s-susp">QR library not loaded. Check connection and reload.</div>`;}
}

function startScan(){
  const area=document.getElementById('scan-area');
  area.innerHTML=`<p style="margin-bottom:10px">Choose scan method:</p>
    <button class="btn btn-green" style="margin-bottom:8px" onclick="startCameraScan()">Use camera (live)</button>
    <button class="btn" onclick="startFileScan()">Take photo / gallery</button>
    <p style="font-size:11px;color:var(--text3);margin-top:8px">On iPhone: "Take photo" opens camera directly</p>`;
}
function startCameraScan(){
  const area=document.getElementById('scan-area');
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){area.innerHTML=`<p style="color:var(--red);margin-bottom:10px">Live camera not supported. Use "Take photo" instead.</p><button class="btn btn-green" onclick="startScan()">Back</button>`;return;}
  area.innerHTML=`<video id="scan-video" autoplay playsinline muted style="width:100%;border-radius:var(--rsm);max-height:260px;object-fit:cover;display:block"></video><p style="font-size:12px;color:var(--text2);margin:6px 0">Point camera at QR code...</p><button class="btn" onclick="stopScan();startScan()">Cancel</button>`;
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}})
    .then(stream=>{scanStream=stream;const v=document.getElementById('scan-video');if(!v){stopScan();return;}v.srcObject=stream;v.setAttribute('playsinline',true);v.muted=true;v.play().catch(()=>{});loadJsQR(()=>startDecodeLoop(v));})
    .catch(err=>{let msg='Camera access denied.';if(err.name==='NotAllowedError')msg='Permission denied. Allow camera in browser settings.';else if(err.name==='NotFoundError')msg='No camera found.';else if(err.name==='NotReadableError')msg='Camera in use by another app.';area.innerHTML=`<p style="color:var(--red);margin-bottom:10px">${msg}</p><button class="btn btn-green" onclick="startScan()">Back</button>`;});
}
function startFileScan(){
  const input=document.createElement('input');input.type='file';input.accept='image/*';input.capture='environment';input.style.display='none';
  input.onchange=function(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      const img=new Image();
      img.onload=function(){
        loadJsQR(()=>{
          const canvas=document.createElement('canvas');canvas.width=img.width;canvas.height=img.height;
          const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0);
          const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
          const code=jsQR(imgData.data,imgData.width,imgData.height);
          if(code&&code.data){
            try{const p=JSON.parse(code.data);if(p.cbvt&&p.r){importSingleRecord(p.r);document.getElementById('scan-area').innerHTML='<p>Scan another?</p><button class="btn btn-green" style="margin-top:8px" onclick="startScan()">Scan again</button>';}
            else document.getElementById('scan-result').innerHTML='<div class="s-susp">QR not from this app.</div>';}
            catch(ex){document.getElementById('scan-result').innerHTML='<div class="s-susp">Could not read QR data.</div>';}
          } else document.getElementById('scan-result').innerHTML='<div class="import-already">No QR found. Try a clearer photo.</div>';
        });
      };img.src=ev.target.result;
    };reader.readAsDataURL(file);document.body.removeChild(input);
  };document.body.appendChild(input);input.click();
}
function stopScan(){if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}if(scanInterval){clearInterval(scanInterval);scanInterval=null;}}
let jsQRLoaded=false;
function loadJsQR(cb){
  if(typeof jsQR!=='undefined'){jsQRLoaded=true;cb();return;}
  const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js';
  s.onload=()=>{jsQRLoaded=true;cb();};
  s.onerror=()=>{const a=document.getElementById('scan-area');if(a)a.innerHTML='<p style="color:var(--red)">Could not load scanner. Check connection.</p><button class="btn" onclick="startScan()">Retry</button>';};
  document.body.appendChild(s);
}
function startDecodeLoop(video){
  const canvas=document.createElement('canvas'),ctx=canvas.getContext('2d');let att=0;
  scanInterval=setInterval(()=>{
    if(!video){stopScan();return;}if(!video.videoWidth){att++;if(att>100)stopScan();return;}
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;
    try{ctx.drawImage(video,0,0);const d=ctx.getImageData(0,0,canvas.width,canvas.height);const code=jsQR(d.data,d.width,d.height,{inversionAttempts:'dontInvert'});
      if(code&&code.data){stopScan();
        try{const p=JSON.parse(code.data);if(p.cbvt&&p.r)importSingleRecord(p.r);else document.getElementById('scan-result').innerHTML='<div class="s-susp">QR not from this app.</div>';}
        catch(e){document.getElementById('scan-result').innerHTML='<div class="s-susp">Could not parse QR data.</div>';}
        const a=document.getElementById('scan-area');if(a)a.innerHTML='<p>Scan another?</p><button class="btn btn-green" style="margin-top:8px" onclick="startScan()">Scan again</button>';
      }
    }catch(e){}
  },250);
}
function manualImport(){
  const txt=(document.getElementById('manual-paste').value||'').trim();
  if(!txt){alert('Please paste some data first.');return;}
  try{const d=JSON.parse(txt);importSingleRecord(d.cbvt?d.r:(d.r||d),'manual-result');}
  catch(e){document.getElementById('manual-result').innerHTML='<div class="s-susp">Invalid JSON format.</div>';}
}
function importSingleRecord(rec,resultId){
  const target=resultId||'scan-result';
  const el=document.getElementById(target);
  if(!rec||!rec.id||!rec.first||!rec.vtype){if(el)el.innerHTML='<div class="s-susp">Invalid record structure.</div>';return;}
  if(records.find(r=>r.id===rec.id)){if(el)el.innerHTML='<div class="import-already">Record already exists. No duplicate added.</div>';return;}
  records.unshift(rec);saveData();
  const d=new Date(rec.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  if(el)el.innerHTML=`<div class="import-success"><p style="font-weight:600;margin-bottom:3px">Imported successfully</p><p>${rec.rank} ${rec.first} ${rec.last}</p><p>${rec.vtype} · ${d}</p>${rec.susp?'<p style="color:var(--red-text);font-weight:600;margin-top:3px">License suspended</p>':''}</div>`;
}

  <button class="btn btn-red" onclick="clearAll()">Delete all records</button>

function exportJSON(){
  if(records.length===0){alert('No records to export.');return;}
  const blob=new Blob([JSON.stringify({cbvt:1,exported:new Date().toISOString(),count:records.length,records},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='violations_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function copyAllJSON(){
  if(records.length===0){alert('No records to copy.');return;}
  const payload=JSON.stringify({cbvt:1,exported:new Date().toISOString(),count:records.length,records});
  const result=document.getElementById('copy-all-result');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(payload)
      .then(()=>{result.innerHTML='<div class="import-success"><p style="font-weight:600">Copied! ('+records.length+' records)</p><p>Paste into WhatsApp with message: <i>Synchronize database</i></p><p style="margin-top:4px;font-size:12px">Recipients: open app → Data → paste in Synchronize field → Replace all</p></div>';})
      .catch(()=>showAllFallback(payload,result));
  } else showAllFallback(payload,result);
}
function showAllFallback(payload,result){
  result.innerHTML='<p style="font-size:12px;color:var(--text2);margin-bottom:6px">Select all and copy:</p><textarea style="width:100%;height:100px;font-size:10px;padding:8px;border:0.5px solid var(--border2);border-radius:var(--rsm);background:var(--bg);color:var(--text);font-family:monospace" readonly onclick="this.select()">'+payload+'</textarea>';
}

function pasteImport(mode){
  const txt=(document.getElementById('paste-import').value||'').trim();
  if(!txt){alert('Please paste JSON text first.');return;}
  try{
    const data=JSON.parse(txt);
    const imported=data.records||(Array.isArray(data)?data:[data]);
    applyImport(imported,mode,'import-result');
    document.getElementById('paste-import').value='';
  }catch(ex){document.getElementById('import-result').innerHTML='<div class="s-susp">Invalid JSON format. Make sure you copied the entire text.</div>';}
}

function importJSON(mode){
  const file=document.getElementById('import-file').files[0];
  if(!file){alert('Please select a JSON file first.');return;}
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      const imported=data.records||(Array.isArray(data)?data:[data]);
      applyImport(imported,mode||'merge','import-result');
    }catch(ex){document.getElementById('import-result').innerHTML='<div class="s-susp">Invalid file format.</div>';}
  };reader.readAsText(file);
}

function normalizeRecord(r){
  // Fill in missing fields from older app versions
  if(!r.suspDuration)r.suspDuration='';
  if(!r.suspUntil)r.suspUntil='';
  if(!r.notify){
    const vd=VIOLATIONS[r.vtype];
    r.notify=(vd&&vd.notify)?vd.notify:[];
  }
  if(r.susp===undefined)r.susp=false;
  if(!r.pts)r.pts=0;
  if(!r.ts)r.ts=new Date(r.date||Date.now()).getTime();
  if(!r.oid)r.oid=(r.first+'_'+r.last).toLowerCase().replace(/\s+/g,'_');
  return r;
}

function applyImport(imported,mode,resultId){
  const el=document.getElementById(resultId);
  // Accept any record that has at minimum id + first/last name OR vtype
  const valid=imported.filter(r=>r&&r.id&&(r.first||r.vtype)).map(normalizeRecord);
  const invalid=imported.length-valid.length;
  if(valid.length===0){
    if(el)el.innerHTML='<div class="s-susp">No valid records found in the data.</div>';
    return;
  }
  if(mode==='replace'){
    if(!confirm('Replace ALL your local records with the received data? Your current records will be deleted.'))return;
    records=valid;
    records.sort((a,b)=>(b.ts||0)-(a.ts||0));
    saveData();
    if(el)el.innerHTML=`<div class="import-success"><p style="font-weight:600">Database replaced.</p><p>${records.length} records loaded.${invalid>0?' '+invalid+' incomplete record(s) skipped.':''}</p></div>`;
    renderData();renderDash();
  } else {
    const existing=new Set(records.map(r=>r.id));
    let added=0;
    valid.forEach(r=>{if(!existing.has(r.id)){records.push(r);added++;}});
    records.sort((a,b)=>(b.ts||0)-(a.ts||0));saveData();
    if(el)el.innerHTML=`<div class="import-success"><p style="font-weight:600">${added} new record(s) added.</p><p>${valid.length-added} duplicate(s) skipped.${invalid>0?' '+invalid+' incomplete skipped.':''}</p></div>`;
    renderData();
  }
}
function clearAll(){
  if(records.length===0){alert('No records to delete.');return;}
  if(!confirm(`Delete ALL ${records.length} record(s)? This cannot be undone.`))return;
  records=[];saveData();alert('All records deleted.');renderData();
}

// ─── COPY JSON ────────────────────────────────────────────────────────────────
function copyJSON(){
  const payload=window._lastQRPayload;if(!payload){alert('No record selected.');return;}
  const btn=document.getElementById('copy-btn'),result=document.getElementById('copy-result');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(payload).then(()=>{if(btn)btn.textContent='Copied!';if(result)result.innerHTML='<p style="font-size:12px;color:var(--green-text);margin-top:6px">Copied. Send via WhatsApp/SMS. Recipient pastes in Manual paste field.</p>';setTimeout(()=>{if(btn)btn.textContent='Copy record as text';},3000);}).catch(()=>showTextFallback(payload,result));
  } else showTextFallback(payload,result);
}
function showTextFallback(payload,result){
  if(result)result.innerHTML='<p style="font-size:12px;color:var(--text2);margin-top:8px;margin-bottom:6px">Select all and copy:</p><textarea style="width:100%;height:80px;font-size:11px;padding:8px;border:0.5px solid var(--border2);border-radius:var(--rsm);background:var(--bg);color:var(--text);font-family:monospace" readonly onclick="this.select()">'+payload+'</textarea>';
}

// ─── PDF REPORT ──────────────────────────────────────────────────────────────
function loadJsPDF(cb){
  if(typeof window.jspdf!=='undefined'){cb();return;}
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  s.onload=()=>cb();
  s.onerror=()=>alert('Could not load PDF library. Check internet connection.');
  document.body.appendChild(s);
}

function generatePDFReport(type){
  // type: 'all', 'suspended', 'single' (uses _expandedId)
  loadJsPDF(()=>{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pw=210,ph=297,ml=15,mr=15,mt=20,cw=pw-ml-mr;
    let y=mt;
    const now=new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});

    function checkPage(needed){if(y+needed>ph-15){doc.addPage();y=mt;drawHeader();}}
    function drawHeader(){
      doc.setFillColor(24,95,165);doc.rect(0,0,pw,16,'F');
      // Logo
      try{doc.addImage(EUFOR_LOGO,'PNG',ml,1,14,14);}catch(e){}
      doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');
      doc.text('NATO/EUFOR UNCLASSIFIED — RELEASABLE TO EU',ml+16,7);
      doc.setFontSize(7.5);doc.setFont('helvetica','normal');
      doc.text('HQ EUFOR / NHQ Sa — Camp Butmir IMP Violation Tracker',ml+16,12);
      doc.text('SOP 3901 — HQ Camp Commandant',pw-mr,12,{align:'right'});
      doc.setTextColor(0,0,0);
    }
    function hline(yy,r,g,b){doc.setDrawColor(r||200,g||200,b||200);doc.line(ml,yy,pw-mr,yy);}
    function badge(txt,x,yy,bgR,bgG,bgB,txtR,txtG,txtB){
      doc.setFillColor(bgR,bgG,bgB);
      const tw=doc.getTextWidth(txt)+4;
      doc.roundedRect(x,yy-4,tw,5.5,1,1,'F');
      doc.setTextColor(txtR,txtG,txtB);doc.setFontSize(7);doc.setFont('helvetica','bold');
      doc.text(txt,x+2,yy);
      doc.setTextColor(0,0,0);
      return tw+2;
    }

    drawHeader();

    // Title
    y=24;
    doc.setFontSize(14);doc.setFont('helvetica','bold');doc.setTextColor(24,95,165);
    const titles={'all':'Violation Records — Full Report','suspended':'Suspended Licenses Report','single':'Individual Violation Record'};
    doc.text(titles[type]||'Violation Report',ml,y);y+=6;
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
    doc.text('Generated: '+now+' | SOP 3901 — HQ Camp Commandant',ml,y);y+=3;
    hline(y);y+=5;

    // Summary stats
    if(type!=='single'){
      const susp=records.filter(r=>r.susp).length;
      const pts=records.reduce((s,r)=>s+(r.pts||0),0);
      doc.setFillColor(245,245,243);doc.rect(ml,y,cw,16,'F');
      doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
      doc.text('Total records',ml+4,y+5);doc.text('Suspended',ml+40,y+5);doc.text('Total penalty pts',ml+80,y+5);doc.text('Report type',ml+130,y+5);
      doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(0,0,0);
      doc.text(String(records.length),ml+4,y+13);
      doc.setTextColor(163,45,45);doc.text(String(susp),ml+40,y+13);
      doc.setTextColor(133,79,11);doc.text(String(pts),ml+80,y+13);
      doc.setTextColor(24,95,165);doc.text(type==='suspended'?'Suspended only':'All records',ml+130,y+13);
      doc.setTextColor(0,0,0);
      y+=22;
    }

    // Get records to print
    let recs=[];
    if(type==='all')recs=[...records].sort((a,b)=>b.ts-a.ts);
    else if(type==='suspended')recs=records.filter(r=>r.susp).sort((a,b)=>b.ts-a.ts);
    else if(type==='single'){recs=_expandedId?records.filter(r=>r.id===_expandedId):[];}

    if(recs.length===0){
      doc.setFontSize(10);doc.text('No records to display.',ml,y);
    }

    recs.forEach((r,idx)=>{
      const cardH=r.susp?52:40;
      checkPage(cardH+6);

      // Record box
      const boxColor=r.susp?[252,235,235]:idx%2===0?[255,255,255]:[250,250,248];
      doc.setFillColor(...boxColor);
      doc.setDrawColor(r.susp?163:220,r.susp?45:220,r.susp?45:220);
      doc.roundedRect(ml,y,cw,cardH,2,2,'FD');

      // Left bar accent
      doc.setFillColor(r.susp?163:24,r.susp?45:95,r.susp?45:165);
      doc.rect(ml,y,2,cardH,'F');

      const x=ml+5,x2=ml+105;
      let ry=y+6;

      // Name + rank
      doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(0,0,0);
      doc.text(`${r.rank} ${r.first} ${r.last}`,x,ry);

      // Date top right
      doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(120,120,120);
      const dstr=new Date(r.date).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
      doc.text(dstr,pw-mr-2,ry,{align:'right'});
      ry+=5;

      // Unit + officer
      doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(80,80,80);
      doc.text(`Unit: ${r.unit||'—'}   |   Reported by: ${r.officer||'—'}   |   Occurrence: #${r.occur}`,x,ry);
      ry+=5;

      // Violation type
      doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(24,95,165);
      const vtxt=r.vtype.length>70?r.vtype.slice(0,68)+'...':r.vtype;
      doc.text(vtxt,x,ry);ry+=5;

      // Badges row
      let bx=x;
      if(r.pts>0)bx+=badge(`${r.pts} PTS`,bx,ry,250,237,192,133,79,11);
      if(r.susp)bx+=badge('SUSPENDED',bx,ry,252,235,235,163,45,45);
      if(r.speed)bx+=badge(`${r.speed} km/h over`,bx,ry,230,230,230,60,60,60);
      ry+=7;

      if(r.susp){
        doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.setTextColor(163,45,45);
        doc.text(`Suspension: ${r.suspDuration||''}${r.suspUntil?' — until '+r.suspUntil:''}`,x,ry);ry+=4.5;
        doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
        const nl=(r.notify&&r.notify.length)?r.notify.join(', '):'—';
        doc.text(`Notify: ${nl}`,x,ry);ry+=4.5;
      }

      if(r.notes){
        doc.setFontSize(7);doc.setFont('helvetica','italic');doc.setTextColor(100,100,100);
        const nlines=doc.splitTextToSize(`Notes: ${r.notes}`,cw-10);
        doc.text(nlines[0]+(nlines.length>1?'…':''),x,ry);
      }

      y+=cardH+4;
    });

    // Footer on each page
    const totalPages=doc.internal.getNumberOfPages();
    for(let i=1;i<=totalPages;i++){
      doc.setPage(i);
      // footer line
      doc.setDrawColor(200,200,200);doc.line(ml,ph-12,pw-mr,ph-12);
      doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(150,150,150);
      doc.text('NATO/EUFOR UNCLASSIFIED — RELEASABLE TO EU',ml,ph-7);
      doc.text(`Page ${i} of ${totalPages}`,pw-mr,ph-7,{align:'right'});
      doc.text('HQ EUFOR / NHQ Sa — Camp Butmir — SOP 3901',pw/2,ph-7,{align:'center'});
    }

    const fname=`IMP_Report_${type}_${new Date().toISOString().slice(0,10)}.pdf`;
    doc.save(fname);
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadData();setPage('dash');
</script>
